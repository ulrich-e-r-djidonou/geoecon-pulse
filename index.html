<!DOCTYPE html>
<html lang="fr" data-lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoEcon Pulse — Veille géoéconomique mondiale</title>
<meta name="description" content="Dashboard interactif de veille géoéconomique couvrant le Canada, les États-Unis, la Chine, l'Inde et le reste du monde.">
<meta property="og:title" content="GeoEcon Pulse — Global Geoeconomic Intelligence">
<meta property="og:description" content="Interactive geoeconomic intelligence dashboard covering Canada, US, China, India and the World.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-card: rgba(255,255,255,0.04);
  --bg-card-hover: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --border-light: rgba(255,255,255,0.12);
  --text-primary: #e8e6e3;
  --text-secondary: #9a9a9a;
  --text-muted: #666;
  --accent-ca: #E03C31;
  --accent-us: #3B5998;
  --accent-cn: #DE2910;
  --accent-in: #FF9933;
  --accent-world: #2E8B57;
  --accent-links: #8B5CF6;
  --positive: #22c55e;
  --negative: #ef4444;
  --neutral-color: #eab308;
  --font-serif: 'DM Serif Display', Georgia, serif;
  --font-sans: 'DM Sans', system-ui, -apple-system, sans-serif;
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Noise texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* Gradient background */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: linear-gradient(160deg, #0a0a0f 0%, #1a1a2e 40%, #16162a 70%, #0a0a0f 100%);
  z-index: -1;
}

/* ===== LAYOUT ===== */
.container { max-width: 1280px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

/* ===== HEADER ===== */
.header {
  padding: 32px 0 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}
.header-inner {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
  flex-wrap: wrap;
}
.header-left { flex: 1; min-width: 200px; }
.header-title {
  font-family: var(--font-serif);
  font-size: clamp(2rem, 5vw, 3rem);
  color: var(--text-primary);
  letter-spacing: -0.02em;
  line-height: 1.1;
}
.header-title span {
  background: linear-gradient(135deg, #8B5CF6, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-subtitle {
  font-size: 0.95rem;
  color: var(--text-secondary);
  margin-top: 4px;
  font-weight: 400;
}
.header-meta {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 8px;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

/* Language Toggle */
.lang-toggle {
  display: flex;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
}
.lang-btn {
  padding: 6px 14px;
  font-size: 0.82rem;
  font-weight: 600;
  font-family: var(--font-sans);
  cursor: pointer;
  background: none;
  border: none;
  color: var(--text-secondary);
  transition: var(--transition);
}
.lang-btn.active {
  background: rgba(139, 92, 246, 0.2);
  color: #8B5CF6;
}
.lang-btn:hover:not(.active) { color: var(--text-primary); }

/* ===== NAVIGATION ===== */
.nav {
  display: flex;
  gap: 4px;
  margin-bottom: 28px;
  overflow-x: auto;
  padding-bottom: 4px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.nav::-webkit-scrollbar { display: none; }

.nav-tab {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-family: var(--font-sans);
  font-size: 0.88rem;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
  flex-shrink: 0;
}
.nav-tab:hover { background: var(--bg-card-hover); color: var(--text-primary); border-color: var(--border-light); }
.nav-tab.active { color: #fff; border-color: var(--tab-color, var(--border-light)); background: color-mix(in srgb, var(--tab-color, #8B5CF6) 15%, transparent); }
.nav-tab .tab-flag { font-size: 1.15rem; }

/* ===== FILTERS ===== */
.filters {
  display: flex;
  gap: 6px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-family: var(--font-sans);
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
}
.filter-btn:hover { border-color: var(--border-light); color: var(--text-primary); }
.filter-btn.active {
  background: rgba(139, 92, 246, 0.15);
  border-color: rgba(139, 92, 246, 0.3);
  color: #a78bfa;
}

/* ===== REGION PANELS ===== */
.panel { display: none; animation: fadeIn 0.35s ease; }
.panel.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== SENTIMENT BADGE ===== */
.sentiment-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  border-radius: var(--radius);
  margin-bottom: 24px;
  border: 1px solid var(--border);
}
.sentiment-bar[data-sentiment="positive"] { background: rgba(34,197,94,0.08); border-color: rgba(34,197,94,0.2); }
.sentiment-bar[data-sentiment="negative"] { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.2); }
.sentiment-bar[data-sentiment="neutral"] { background: rgba(234,179,8,0.08); border-color: rgba(234,179,8,0.2); }

.sentiment-icon {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; font-weight: 700;
  flex-shrink: 0;
}
.sentiment-bar[data-sentiment="positive"] .sentiment-icon { background: rgba(34,197,94,0.2); color: var(--positive); }
.sentiment-bar[data-sentiment="negative"] .sentiment-icon { background: rgba(239,68,68,0.2); color: var(--negative); }
.sentiment-bar[data-sentiment="neutral"] .sentiment-icon { background: rgba(234,179,8,0.2); color: var(--neutral-color); }

.sentiment-text { flex: 1; }
.sentiment-label { font-weight: 600; font-size: 0.95rem; }
.sentiment-reason { font-size: 0.82rem; color: var(--text-secondary); margin-top: 2px; }

/* ===== INDICATOR CARDS ===== */
.indicators-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}
.indicator-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  transition: var(--transition);
}
.indicator-card:hover { background: var(--bg-card-hover); border-color: var(--border-light); }
.indicator-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; }
.indicator-value {
  font-family: var(--font-serif);
  font-size: 1.65rem;
  line-height: 1.1;
}
.indicator-unit { font-size: 0.85rem; font-family: var(--font-sans); color: var(--text-secondary); }
.indicator-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  font-size: 0.75rem;
  color: var(--text-muted);
}
.trend-arrow { font-weight: 700; }
.trend-arrow.up { color: var(--positive); }
.trend-arrow.down { color: var(--negative); }
.trend-arrow.stable { color: var(--neutral-color); }

/* ===== SECTION TITLES ===== */
.section-title {
  font-family: var(--font-serif);
  font-size: 1.25rem;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* ===== SPARKLINE ===== */
.sparkline-container {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 28px;
}
.sparkline-label { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 12px; font-weight: 500; }
.sparkline-wrap { position: relative; height: 140px; width: 100%; }

/* ===== SUMMARY ===== */
.summary-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 28px;
  font-size: 0.92rem;
  line-height: 1.75;
  color: var(--text-secondary);
  border-left: 3px solid var(--region-color, var(--accent-world));
}

/* ===== HEADLINES ===== */
.headlines-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 32px; }
.headline-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  transition: var(--transition);
}
.headline-item:hover { background: var(--bg-card-hover); border-color: var(--border-light); }
.headline-impact {
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-top: 7px;
  flex-shrink: 0;
}
.headline-impact.high { background: var(--negative); box-shadow: 0 0 6px rgba(239,68,68,0.4); }
.headline-impact.medium { background: #f59e0b; }
.headline-impact.low { background: var(--text-muted); }
.headline-content { flex: 1; min-width: 0; }
.headline-link {
  color: var(--text-primary);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 500;
  line-height: 1.4;
  display: block;
}
.headline-link:hover { color: #a78bfa; }
.headline-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.headline-badge {
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.badge-trade { background: rgba(59,130,246,0.15); color: #60a5fa; }
.badge-monetary { background: rgba(139,92,246,0.15); color: #a78bfa; }
.badge-energy { background: rgba(234,179,8,0.15); color: #fbbf24; }
.badge-tech { background: rgba(6,182,212,0.15); color: #22d3ee; }
.badge-geopolitics { background: rgba(239,68,68,0.15); color: #f87171; }
.headline-time { font-size: 0.72rem; color: var(--text-muted); }
.headline-source { font-size: 0.72rem; color: var(--text-muted); font-style: italic; }

/* ===== INTERCONNECTIONS ===== */
.interconnections-panel { display: none; animation: fadeIn 0.35s ease; }
.interconnections-panel.active { display: block; }

/* Network Visualization */
.network-container {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 28px;
  position: relative;
  min-height: 400px;
}
.network-svg { width: 100%; height: 400px; }

/* Interconnection Cards */
.interconnection-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
  transition: var(--transition);
}
.interconnection-card:hover { background: var(--bg-card-hover); border-color: var(--border-light); }
.interconnection-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.interconnection-regions {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.82rem;
  font-weight: 600;
}
.interconnection-arrow { color: var(--text-muted); }
.region-badge {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 0.75rem;
  font-weight: 600;
}
.region-badge-CA { background: rgba(224,60,49,0.15); color: var(--accent-ca); }
.region-badge-US { background: rgba(59,89,152,0.15); color: #6d8fd4; }
.region-badge-CN { background: rgba(222,41,16,0.15); color: #e05a3a; }
.region-badge-IN { background: rgba(255,153,51,0.15); color: var(--accent-in); }
.region-badge-WORLD { background: rgba(46,139,87,0.15); color: var(--accent-world); }

.interconnection-impact-badge {
  font-size: 0.68rem;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
  text-transform: uppercase;
  margin-left: auto;
}
.impact-high { background: rgba(239,68,68,0.15); color: #f87171; }
.impact-medium { background: rgba(234,179,8,0.15); color: #fbbf24; }

.interconnection-title {
  font-family: var(--font-serif);
  font-size: 1.05rem;
  margin-bottom: 8px;
  line-height: 1.35;
}
.interconnection-desc { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; }

/* ===== TIMELINE ===== */
.timeline { position: relative; padding-left: 28px; margin-bottom: 32px; }
.timeline::before {
  content: '';
  position: absolute;
  left: 8px; top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom, var(--accent-links), transparent);
}
.timeline-event {
  position: relative;
  padding: 12px 0 20px;
}
.timeline-event::before {
  content: '';
  position: absolute;
  left: -24px; top: 16px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--accent-links);
  border: 2px solid var(--bg-primary);
}
.timeline-date { font-size: 0.72rem; color: var(--text-muted); font-weight: 600; margin-bottom: 4px; letter-spacing: 0.04em; }
.timeline-title { font-size: 0.9rem; font-weight: 500; margin-bottom: 6px; }
.timeline-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.timeline-tag {
  font-size: 0.65rem;
  padding: 1px 7px;
  border-radius: 8px;
  font-weight: 600;
}

/* ===== PROVINCIAL ANALYSIS ===== */
.provincial-section { margin-top: 40px; padding-top: 32px; border-top: 1px solid var(--border); }

/* Impact Matrix */
.impact-matrix-container {
  overflow-x: auto;
  margin-bottom: 28px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.impact-matrix {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.78rem;
  min-width: 700px;
}
.impact-matrix th, .impact-matrix td {
  padding: 10px 8px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
.impact-matrix th {
  background: rgba(255,255,255,0.03);
  font-weight: 600;
  color: var(--text-secondary);
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  position: sticky;
  top: 0;
}
.impact-matrix th:first-child, .impact-matrix td:first-child {
  text-align: left;
  padding-left: 14px;
  font-weight: 500;
  color: var(--text-primary);
  min-width: 200px;
  background: rgba(255,255,255,0.02);
}
.impact-matrix tr:hover { background: rgba(255,255,255,0.02); }
.impact-cell { font-weight: 700; font-size: 0.85rem; }
.impact-pp { color: var(--positive); }
.impact-p { color: rgba(34,197,94,0.6); }
.impact-n { color: rgba(239,68,68,0.6); }
.impact-nn { color: var(--negative); }
.impact-zero { color: var(--text-muted); }

/* Province Group Cards */
.province-group {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
  transition: var(--transition);
}
.province-group:hover { border-color: var(--border-light); }
.province-group-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px;
  cursor: pointer;
  gap: 12px;
}
.province-group-header:hover { background: var(--bg-card-hover); }
.province-group-left { display: flex; align-items: center; gap: 12px; flex: 1; }
.province-group-title { font-family: var(--font-serif); font-size: 1.05rem; }
.province-group-provinces {
  display: flex; gap: 4px; flex-wrap: wrap;
}
.province-tag {
  font-size: 0.68rem;
  padding: 2px 8px;
  border-radius: 8px;
  background: rgba(255,255,255,0.06);
  color: var(--text-secondary);
  font-weight: 600;
}
.verdict-badge {
  font-size: 0.72rem;
  padding: 4px 12px;
  border-radius: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  flex-shrink: 0;
}
.verdict-positive { background: rgba(34,197,94,0.12); color: var(--positive); }
.verdict-negative { background: rgba(239,68,68,0.12); color: var(--negative); }
.verdict-neutral { background: rgba(234,179,8,0.12); color: var(--neutral-color); }

.province-group-chevron {
  color: var(--text-muted);
  transition: var(--transition);
  font-size: 0.9rem;
  flex-shrink: 0;
}
.province-group.open .province-group-chevron { transform: rotate(180deg); }

.province-group-body {
  display: none;
  padding: 0 20px 20px;
}
.province-group.open .province-group-body { display: block; }

.province-analysis-text {
  font-size: 0.88rem;
  color: var(--text-secondary);
  line-height: 1.75;
  margin-bottom: 16px;
  white-space: pre-line;
}

.strengths-weaknesses {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
@media (max-width: 600px) { .strengths-weaknesses { grid-template-columns: 1fr; } }

.sw-card {
  border-radius: var(--radius-sm);
  padding: 14px 16px;
}
.sw-card.strengths {
  background: rgba(34,197,94,0.05);
  border: 1px solid rgba(34,197,94,0.15);
}
.sw-card.weaknesses {
  background: rgba(239,68,68,0.05);
  border: 1px solid rgba(239,68,68,0.15);
}
.sw-title {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 700;
  margin-bottom: 8px;
}
.sw-card.strengths .sw-title { color: var(--positive); }
.sw-card.weaknesses .sw-title { color: var(--negative); }
.sw-list {
  list-style: none;
  font-size: 0.82rem;
  color: var(--text-secondary);
  line-height: 1.6;
}
.sw-list li { padding: 3px 0; padding-left: 14px; position: relative; }
.sw-list li::before {
  content: '';
  position: absolute;
  left: 0; top: 10px;
  width: 5px; height: 5px;
  border-radius: 50%;
}
.sw-card.strengths .sw-list li::before { background: var(--positive); }
.sw-card.weaknesses .sw-list li::before { background: var(--negative); }

/* ===== FOOTER ===== */
.footer {
  text-align: center;
  padding: 32px 0;
  margin-top: 40px;
  border-top: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 0.8rem;
}
.footer a { color: var(--text-secondary); text-decoration: none; }
.footer a:hover { color: var(--text-primary); }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .container { padding: 0 14px; }
  .header { padding: 20px 0 16px; }
  .header-inner { flex-direction: column; }
  .header-right { width: 100%; justify-content: flex-end; }
  .indicators-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .indicator-card { padding: 14px; }
  .indicator-value { font-size: 1.35rem; }
  .headline-item { padding: 12px 14px; }
  .nav-tab { padding: 8px 14px; font-size: 0.82rem; }
  .network-svg { height: 300px; }
  .summary-box { padding: 16px; }
  .section-title { font-size: 1.1rem; }
}
@media (max-width: 480px) {
  .indicators-grid { grid-template-columns: 1fr 1fr; }
  .indicator-card { padding: 12px; }
  .indicator-value { font-size: 1.2rem; }
  .sentiment-bar { flex-direction: column; text-align: center; gap: 8px; padding: 14px; }
  .headline-meta { flex-direction: column; align-items: flex-start; gap: 4px; }
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
</style>
</head>
<body>
<div class="container">
  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <h1 class="header-title">GeoEcon <span>Pulse</span></h1>

      <span class="tab-flag">🇨🇳</span> <span data-i18n="tab_CN">Chine</span>
    </button>
    <button class="nav-tab" data-region="IN" style="--tab-color: var(--accent-in);" onclick="showRegion('IN')">

  <!-- FILTERS -->
  <div class="filters" id="theme-filters">

    <button class="filter-btn" data-theme="trade" onclick="setFilter('trade')"><span data-i18n="filter_trade">Commerce</span></button>
    <button class="filter-btn" data-theme="monetary" onclick="setFilter('monetary')"><span data-i18n="filter_monetary">Pol. monétaire</span></button>
    <button class="filter-btn" data-theme="energy" onclick="setFilter('energy')"><span data-i18n="filter_energy">Énergie</span></button>
    <button class="filter-btn" data-theme="tech" onclick="setFilter('tech')"><span data-i18n="filter_tech">Tech</span></button>
    <button class="filter-btn" data-theme="geopolitics" onclick="setFilter('geopolitics')"><span data-i18n="filter_geopolitics">Géopolitique</span></button>
  </div>

  <!-- REGION PANELS -->
  <main id="panels-container"></main>

  <!-- INTERCONNECTIONS PANEL -->
  <div class="interconnections-panel" id="interconnections-panel">

    <!-- Network Visualization -->
    <div class="network-container">
      <svg class="network-svg" id="network-svg" viewBox="0 0 800 400"></svg>
    </div>

    <!-- Interconnection Cards -->
    <h3 class="section-title" data-i18n="links_detail">Analyse des liens</h3>
    <div id="interconnections-cards"></div>

    <!-- Timeline -->
    <h3 class="section-title" style="margin-top:32px;" data-i18n="timeline_title">Chronologie des événements clés</h3>
    <div class="timeline" id="timeline-container"></div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <p data-i18n="footer_text">Conçu par un économiste. Données provenant de sources publiques officielles.</p>
    <p style="margin-top:6px;"><a href="https://github.com/ulrich-e-r-djidonou/geoecon-pulse" target="_blank">GitHub</a> · Built with Claude Code</p>
  </footer>
</div>

<script>
// ===== TRANSLATIONS =====
const T = {
  fr: {
    subtitle: "Veille géoéconomique mondiale",
    lastUpdate: "Dernière mise à jour",
    tab_CA: "Canada", tab_US: "États-Unis", tab_CN: "Chine", tab_IN: "Inde", tab_WORLD: "Monde", tab_LINKS: "Interconnexions",
    filter_all: "Tous", filter_trade: "Commerce", filter_monetary: "Pol. monétaire", filter_energy: "Énergie", filter_tech: "Tech", filter_geopolitics: "Géopolitique",
    sentiment_positive: "Positif", sentiment_negative: "Négatif", sentiment_neutral: "Neutre",
    section_indicators: "Indicateurs macroéconomiques",
    section_headlines: "Actualités",
    section_summary: "Résumé de la semaine",
    section_trend: "Tendance",
    interconnections_title: "Interconnexions géoéconomiques",
    links_detail: "Analyse des liens",
    timeline_title: "Chronologie des événements clés",
    footer_text: "Conçu par un économiste. Données provenant de sources publiques officielles.",
    indicator_gdp: "Croissance PIB", indicator_inflation: "Inflation", indicator_rate: "Taux directeur",
    indicator_exchange: "Taux de change", indicator_stock: "Indice boursier",
    impact_high: "Impact fort", impact_medium: "Impact moyen", impact_low: "Impact faible",
    themes: { trade: "Commerce", monetary: "Pol. monétaire", energy: "Énergie", tech: "Tech", geopolitics: "Géopolitique" },
    provincial_title: "Impact sur les provinces canadiennes",
    provincial_subtitle: "Analyse croisée : chocs internationaux × profils économiques provinciaux",
    matrix_title: "Matrice d'impact",
    strengths_label: "Forces", weaknesses_label: "Faiblesses"
  },
  en: {
    subtitle: "Global Geoeconomic Intelligence",
    lastUpdate: "Last updated",
    tab_CA: "Canada", tab_US: "United States", tab_CN: "China", tab_IN: "India", tab_WORLD: "World", tab_LINKS: "Interconnections",
    filter_all: "All", filter_trade: "Trade", filter_monetary: "Monetary Pol.", filter_energy: "Energy", filter_tech: "Tech", filter_geopolitics: "Geopolitics",
    sentiment_positive: "Positive", sentiment_negative: "Negative", sentiment_neutral: "Neutral",
    section_indicators: "Macroeconomic Indicators",
    section_headlines: "Headlines",
    section_summary: "Weekly Summary",
    section_trend: "Trend",
    interconnections_title: "Geoeconomic Interconnections",
    links_detail: "Link Analysis",
    timeline_title: "Key Events Timeline",
    footer_text: "Designed by an economist. Data from official public sources.",
    indicator_gdp: "GDP Growth", indicator_inflation: "Inflation", indicator_rate: "Policy Rate",
    indicator_exchange: "Exchange Rate", indicator_stock: "Stock Index",
    impact_high: "High impact", impact_medium: "Medium impact", impact_low: "Low impact",
    themes: { trade: "Trade", monetary: "Monetary Pol.", energy: "Energy", tech: "Tech", geopolitics: "Geopolitics" },
    provincial_title: "Impact on Canadian Provinces",
    provincial_subtitle: "Cross-analysis: international shocks × provincial economic profiles",
    matrix_title: "Impact Matrix",
    strengths_label: "Strengths", weaknesses_label: "Weaknesses"
  }
};

let currentLang = 'fr';
let currentRegion = 'CA';
let currentFilter = 'all';
let DATA = null;
let sparkCharts = {};

const REGION_COLORS = { CA: '#E03C31', US: '#3B5998', CN: '#DE2910', IN: '#FF9933', WORLD: '#2E8B57' };

// ===== INIT =====
async function init() {
  try {
    const resp = await fetch('data/indicators.json');
    DATA = await resp.json();
  } catch(e) {
    // Fallback: try inline
    console.error('Could not load indicators.json, check file path', e);
    return;
  }
  document.getElementById('update-date').textContent = DATA.lastUpdated;
  buildAllPanels();
  buildInterconnections();
  buildTimeline();
  showRegion('CA');
}

// ===== BUILD PANELS =====
function buildAllPanels() {
  const container = document.getElementById('panels-container');
  container.innerHTML = '';
  const regionKeys = ['CA','US','CN','IN','WORLD'];
  regionKeys.forEach(key => {
    const r = DATA.regions[key];
    const color = REGION_COLORS[key];
    const lang = currentLang;

    const sentimentIcons = { positive: '▲', negative: '▼', neutral: '●' };

    // Build indicator cards
    const indCards = buildIndicatorCards(r.indicators, key);

    // Build headlines
    const headlines = buildHeadlines(r.headlines, key);

    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.id = `panel-${key}`;
    panel.innerHTML = `
      <!-- Sentiment -->
      <div class="sentiment-bar" data-sentiment="${r.sentiment.value}">
        <div class="sentiment-icon">${sentimentIcons[r.sentiment.value]}</div>
        <div class="sentiment-text">
          <div class="sentiment-label">${r.sentiment.label[lang]}</div>
          <div class="sentiment-reason">${r.sentiment.reason[lang]}</div>
        </div>
      </div>

      <!-- Indicators -->
      <h2 class="section-title" data-i18n="section_indicators">${T[lang].section_indicators}</h2>
      <div class="indicators-grid">${indCards}</div>

      <!-- Sparkline -->
      <h2 class="section-title" data-i18n="section_trend">${T[lang].section_trend}</h2>
      <div class="sparkline-container">
        <div class="sparkline-label">${r.sparkline.label[lang]}</div>
        <div class="sparkline-wrap"><canvas id="spark-${key}"></canvas></div>
      </div>

      <!-- Summary -->
      <h2 class="section-title" data-i18n="section_summary">${T[lang].section_summary}</h2>
      <div class="summary-box" style="--region-color: ${color};">${r.summary[lang]}</div>

      <!-- Headlines -->
      <h2 class="section-title" data-i18n="section_headlines">${T[lang].section_headlines}</h2>
      <div class="headlines-list" id="headlines-${key}">${headlines}</div>

      ${key === 'CA' && r.provincialAnalysis ? buildProvincialAnalysis(r.provincialAnalysis) : ''}
    `;
    container.appendChild(panel);
  });
}

// ===== PROVINCIAL ANALYSIS =====
function buildProvincialAnalysis(pa) {
  var lang = currentLang;
  var t = T[lang];
  var provKeys = ['AB','SK','NL','ON','QC','BC','MB','NB','NS','PE'];
  var impactSymbols = { '2': '++', '1': '+', '0': '·', '-1': '\u2212', '-2': '\u2212\u2212' };
  var impactClasses = { '2': 'impact-pp', '1': 'impact-p', '0': 'impact-zero', '-1': 'impact-n', '-2': 'impact-nn' };

  // Build matrix header
  var thCells = provKeys.map(function(p) { return '<th>' + p + '</th>'; }).join('');

  // Build matrix rows
  var matrixRows = pa.shocks.map(function(shock) {
    var cells = provKeys.map(function(prov) {
      var val = pa.impactMatrix[prov][shock.id];
      return '<td class="impact-cell ' + impactClasses[val] + '">' + impactSymbols[val] + '</td>';
    }).join('');
    return '<tr><td>' + shock.label[lang] + '</td>' + cells + '</tr>';
  }).join('');

  // Score row
  var scoreRow = provKeys.map(function(prov) {
    var matrix = pa.impactMatrix[prov];
    var score = Object.values(matrix).reduce(function(a,b){return a+b;}, 0);
    var cls = score > 0 ? 'impact-pp' : score < 0 ? 'impact-nn' : 'impact-zero';
    return '<td class="impact-cell ' + cls + '" style="font-size:0.9rem;">' + (score > 0 ? '+' : '') + score + '</td>';
  }).join('');

  // Build group cards
  var groups = pa.groups.map(function(g) {
    var provTags = g.provinces.map(function(p) { return '<span class="province-tag">' + p + '</span>'; }).join('');
    var strengthsList = g.strengths[lang].map(function(s) { return '<li>' + s + '</li>'; }).join('');
    var weaknessesList = g.weaknesses[lang].map(function(w) { return '<li>' + w + '</li>'; }).join('');

    return '<div class="province-group" id="pgroup-' + g.id + '">' +
      '<div class="province-group-header" onclick="toggleProvinceGroup(\'' + g.id + '\')">' +
        '<div class="province-group-left"><div>' +
          '<div class="province-group-title">' + g.label[lang] + '</div>' +
          '<div class="province-group-provinces" style="margin-top:4px;">' + provTags + '</div>' +
        '</div></div>' +
        '<span class="verdict-badge verdict-' + g.verdictType + '">' + g.verdict[lang] + '</span>' +
        '<span class="province-group-chevron">\u25BC</span>' +
      '</div>' +
      '<div class="province-group-body">' +
        '<div class="province-analysis-text">' + g.analysis[lang] + '</div>' +
        '<div class="strengths-weaknesses">' +
          '<div class="sw-card strengths"><div class="sw-title">' + t.strengths_label + '</div><ul class="sw-list">' + strengthsList + '</ul></div>' +
          '<div class="sw-card weaknesses"><div class="sw-title">' + t.weaknesses_label + '</div><ul class="sw-list">' + weaknessesList + '</ul></div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  var scoreLabel = lang === 'fr' ? 'Score net' : 'Net score';

  return '<div class="provincial-section">' +
    '<h2 class="section-title" style="border-bottom:none;margin-bottom:4px;">' + t.provincial_title + '</h2>' +
    '<p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:20px;">' + t.provincial_subtitle + '</p>' +
    '<h3 class="section-title" style="font-size:1rem;">' + t.matrix_title + '</h3>' +
    '<div class="impact-matrix-container"><table class="impact-matrix">' +
      '<thead><tr><th></th>' + thCells + '</tr></thead>' +
      '<tbody>' + matrixRows +
        '<tr style="border-top:2px solid var(--border-light);"><td style="font-weight:700;">' + scoreLabel + '</td>' + scoreRow + '</tr>' +
      '</tbody></table></div>' +
    groups +
  '</div>';
}

function buildIndicatorCards(indicators, regionKey) {
  const lang = currentLang;
  const labels = {
    gdp: T[lang].indicator_gdp,
    inflation: T[lang].indicator_inflation,
    rate: T[lang].indicator_rate,
    exchange: T[lang].indicator_exchange,
    stockIndex: T[lang].indicator_stock
  };
  let html = '';
  for (const [key, ind] of Object.entries(indicators)) {
    if (ind.value === null) continue;
    const trendArrows = { up: '↑', down: '↓', stable: '→' };
    const isStock = key === 'stockIndex';
    const displayVal = isStock ? ind.value.toLocaleString() : ind.value;
    const unit = isStock ? '' : ind.unit;
    const label = isStock ? ind.name : labels[key];
    const period = ind.period;
    const change = isStock && ind.change ? ` (${ind.change > 0 ? '+' : ''}${ind.change}%)` : '';
    const trend = ind.trend || 'stable';

    html += `
      <div class="indicator-card">
        <div class="indicator-label">${label}</div>
        <div class="indicator-value">${displayVal}<span class="indicator-unit">${unit ? ' ' + unit : ''}</span></div>
        <div class="indicator-meta">
          <span class="trend-arrow ${trend}">${trendArrows[trend]}</span>
          <span>${period}${change}</span>
        </div>
      </div>
    `;
  }
  return html;
}

function buildHeadlines(headlines, regionKey) {
  const lang = currentLang;
  const themeLabels = T[lang].themes;
  const badgeClasses = { trade: 'badge-trade', monetary: 'badge-monetary', energy: 'badge-energy', tech: 'badge-tech', geopolitics: 'badge-geopolitics' };

  return headlines.map(h => `
    <div class="headline-item" data-theme="${h.theme}">
      <div class="headline-impact ${h.impact}"></div>
      <div class="headline-content">
        <a class="headline-link" href="${h.url}" target="_blank" rel="noopener">${h.title[lang]}</a>
        <div class="headline-meta">
          <span class="headline-badge ${badgeClasses[h.theme]}">${themeLabels[h.theme] || h.theme}</span>
          <span class="headline-time">${h.time}</span>
          <span class="headline-source">${h.source}</span>
        </div>
      </div>
    </div>
  `).join('');
}

// ===== SPARKLINE CHARTS =====
function renderSparkline(regionKey) {
  const canvasId = `spark-${regionKey}`;
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;

  // Destroy existing chart
  if (sparkCharts[regionKey]) {
    sparkCharts[regionKey].destroy();
  }

  const r = DATA.regions[regionKey];
  const color = REGION_COLORS[regionKey];
  const data = r.sparkline.data;
  const months = currentLang === 'fr'
    ? ['Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc','Jan','Fév','Mar']
    : ['Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar'];

  const ctx = canvas.getContext('2d');
  const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
  gradient.addColorStop(0, color + '40');
  gradient.addColorStop(1, color + '00');

  sparkCharts[regionKey] = new Chart(ctx, {
    type: 'line',
    data: {
      labels: months,
      datasets: [{
        data: data,
        borderColor: color,
        backgroundColor: gradient,
        borderWidth: 2.5,
        fill: true,
        tension: 0.4,
        pointRadius: 0,
        pointHoverRadius: 5,
        pointHoverBackgroundColor: color,
        pointHoverBorderColor: '#fff',
        pointHoverBorderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        backgroundColor: 'rgba(10,10,15,0.9)',
        titleColor: '#e8e6e3',
        bodyColor: '#9a9a9a',
        borderColor: 'rgba(255,255,255,0.1)',
        borderWidth: 1,
        padding: 10,
        displayColors: false,
        titleFont: { family: "'DM Sans', sans-serif", size: 12 },
        bodyFont: { family: "'DM Sans', sans-serif", size: 12 }
      }},
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
          ticks: { color: '#666', font: { size: 10, family: "'DM Sans', sans-serif" } }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
          ticks: { color: '#666', font: { size: 10, family: "'DM Sans', sans-serif" }, maxTicksLimit: 5 }
        }
      }
    }
  });
}

// ===== INTERCONNECTIONS =====
function buildInterconnections() {
  if (!DATA) return;
  const lang = currentLang;

  // Cards
  const cardsContainer = document.getElementById('interconnections-cards');
  cardsContainer.innerHTML = DATA.interconnections.map(ic => {
    const impactClass = ic.impact === 'high' ? 'impact-high' : 'impact-medium';
    const impactLabel = ic.impact === 'high' ? T[lang].impact_high : T[lang].impact_medium;
    return `
      <div class="interconnection-card" data-theme="${ic.type}">
        <div class="interconnection-header">
          <div class="interconnection-regions">
            <span class="region-badge region-badge-${ic.from}">${DATA.regions[ic.from]?.flag || ''} ${DATA.regions[ic.from]?.name[lang] || ic.from}</span>
            <span class="interconnection-arrow">→</span>
            <span class="region-badge region-badge-${ic.to}">${DATA.regions[ic.to]?.flag || ''} ${DATA.regions[ic.to]?.name[lang] || ic.to}</span>
          </div>
          <span class="interconnection-impact-badge ${impactClass}">${impactLabel}</span>
        </div>
        <div class="interconnection-title">${ic.title[lang]}</div>
        <div class="interconnection-desc">${ic.description[lang]}</div>
      </div>
    `;
  }).join('');

  // Network SVG
  drawNetwork();
}

function drawNetwork() {
  const svg = document.getElementById('network-svg');
  if (!svg || !DATA) return;

  const nodes = {
    CA:    { x: 200, y: 100, color: REGION_COLORS.CA, flag: '🇨🇦', label: DATA.regions.CA.name[currentLang] },
    US:    { x: 200, y: 300, color: REGION_COLORS.US, flag: '🇺🇸', label: DATA.regions.US.name[currentLang] },
    CN:    { x: 600, y: 100, color: REGION_COLORS.CN, flag: '🇨🇳', label: DATA.regions.CN.name[currentLang] },
    IN:    { x: 600, y: 300, color: REGION_COLORS.IN, flag: '🇮🇳', label: DATA.regions.IN.name[currentLang] },
    WORLD: { x: 400, y: 200, color: REGION_COLORS.WORLD, flag: '🌍', label: DATA.regions.WORLD.name[currentLang] }
  };

  let svgContent = `
    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="rgba(255,255,255,0.3)" />
      </marker>
      <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
        <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
  `;

  // Draw edges
  DATA.interconnections.forEach(ic => {
    const from = nodes[ic.from];
    const to = nodes[ic.to];
    if (!from || !to) return;
    const opacity = ic.impact === 'high' ? 0.5 : 0.25;
    const width = ic.impact === 'high' ? 2.5 : 1.5;
    // Offset slightly to avoid overlap with node circles
    const dx = to.x - from.x;
    const dy = to.y - from.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const offsetRatio = 35 / dist;
    const x1 = from.x + dx * offsetRatio;
    const y1 = from.y + dy * offsetRatio;
    const x2 = to.x - dx * offsetRatio;
    const y2 = to.y - dy * offsetRatio;

    svgContent += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${from.color}" stroke-width="${width}" stroke-opacity="${opacity}" marker-end="url(#arrowhead)"/>`;
  });

  // Draw nodes
  for (const [key, node] of Object.entries(nodes)) {
    svgContent += `
      <circle cx="${node.x}" cy="${node.y}" r="30" fill="${node.color}20" stroke="${node.color}" stroke-width="2" filter="url(#glow)" />
      <text x="${node.x}" y="${node.y + 5}" text-anchor="middle" font-size="20">${node.flag}</text>
      <text x="${node.x}" y="${node.y + 50}" text-anchor="middle" fill="#e8e6e3" font-family="'DM Sans', sans-serif" font-size="12" font-weight="600">${node.label}</text>
    `;
  }

  svg.innerHTML = svgContent;
}

// ===== TIMELINE =====
function buildTimeline() {
  if (!DATA) return;
  const lang = currentLang;
  const container = document.getElementById('timeline-container');

  container.innerHTML = DATA.timeline.map(ev => {
    const tags = ev.regions.map(r => {
      const region = DATA.regions[r];
      return `<span class="timeline-tag region-badge-${r}">${region?.flag || ''} ${region?.name[lang] || r}</span>`;
    }).join('');

    const themeLabel = T[lang].themes[ev.theme] || ev.theme;
    const badgeClass = `badge-${ev.theme}`;

    return `
      <div class="timeline-event" data-theme="${ev.theme}">
        <div class="timeline-date">${ev.date}</div>
        <div class="timeline-title">${ev.title[lang]}</div>
        <div class="timeline-tags">
          ${tags}
          <span class="timeline-tag headline-badge ${badgeClass}">${themeLabel}</span>
        </div>
      </div>
    `;
  }).join('');
}

// ===== NAVIGATION =====
function showRegion(region) {
  currentRegion = region;

  // Update tabs
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.nav-tab[data-region="${region}"]`).classList.add('active');

  // Show/hide panels
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('interconnections-panel').classList.remove('active');
  const panel = document.getElementById(`panel-${region}`);
  if (panel) {
    panel.classList.add('active');
    // Render sparkline after panel is visible
    setTimeout(() => renderSparkline(region), 50);
  }

  // Show filters
  document.getElementById('theme-filters').style.display = 'flex';

  // Apply current filter
  applyFilter();
}

function showInterconnections() {
  currentRegion = 'LINKS';

  // Update tabs
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.nav-tab[data-region="LINKS"]').classList.add('active');

  // Show interconnections, hide region panels
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('interconnections-panel').classList.add('active');

  // Show filters for interconnections too
  document.getElementById('theme-filters').style.display = 'flex';
  applyFilter();
}

// ===== FILTERS =====
function setFilter(theme) {
  currentFilter = theme;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.filter-btn[data-theme="${theme}"]`).classList.add('active');
  applyFilter();
}

function toggleProvinceGroup(id) {
  const el = document.getElementById('pgroup-' + id);
  if (el) el.classList.toggle('open');
}

function applyFilter() {
  // Filter headlines
  document.querySelectorAll('.headline-item').forEach(item => {
    if (currentFilter === 'all' || item.dataset.theme === currentFilter) {
      item.style.display = 'flex';
    } else {
      item.style.display = 'none';
    }
  });

  // Filter interconnection cards
  document.querySelectorAll('.interconnection-card').forEach(card => {
    if (currentFilter === 'all' || card.dataset.theme === currentFilter) {
      card.style.display = 'block';
    } else {
      card.style.display = 'none';
    }
  });

  // Filter timeline
  document.querySelectorAll('.timeline-event').forEach(ev => {
    if (currentFilter === 'all' || ev.dataset.theme === currentFilter) {
      ev.style.display = 'block';
    } else {
      ev.style.display = 'none';
    }
  });
}

// ===== LANGUAGE =====
function setLang(lang) {
  currentLang = lang;
  document.documentElement.setAttribute('data-lang', lang);
  document.documentElement.setAttribute('lang', lang);

  // Toggle buttons
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[data-lang="${lang}"]`).classList.add('active');

  // Update all i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (T[lang][key]) {
      el.textContent = T[lang][key];
    }
  });

  // Rebuild dynamic content
  buildAllPanels();
  buildInterconnections();
  buildTimeline();

  // Re-show current view
  if (currentRegion === 'LINKS') {
    showInterconnections();
  } else {
    showRegion(currentRegion);
  }
}

// ===== START =====
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
