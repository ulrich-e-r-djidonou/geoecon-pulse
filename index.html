<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code OSS Explorer</title>
<meta name="description" content="A curated explorer of open source tools built for the Claude Code ecosystem.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d14;
  --bg-card: #13131f;
  --bg-card-hover: #1a1a2e;
  --border: #1e1e30;
  --border-hover: #3b3b5c;
  --text: #e8e8f0;
  --text-muted: #7878a0;
  --text-dim: #4a4a6a;
  --accent: #7c6fff;
  --accent-soft: rgba(124,111,255,0.12);
  --accent-glow: rgba(124,111,255,0.25);
  --green: #4ade80;
  --orange: #fb923c;
  --pink: #f472b6;
  --cyan: #22d3ee;
  --yellow: #facc15;
  --radius: 12px;
  --radius-sm: 6px;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

/* ---- HEADER ---- */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(13,13,20,0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -0.02em;
  color: var(--text);
  text-decoration: none;
  flex-shrink: 0;
}

.logo-icon {
  width: 32px;
  height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.header-stats {
  display: flex;
  align-items: center;
  gap: 20px;
}

.stat-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text-muted);
}

.stat-pill strong {
  color: var(--text);
  font-weight: 600;
}

/* ---- HERO ---- */
.hero {
  max-width: 1200px;
  margin: 0 auto;
  padding: 64px 24px 40px;
  text-align: center;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--accent-soft);
  border: 1px solid var(--accent-glow);
  color: var(--accent);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 100px;
  margin-bottom: 24px;
}

.hero h1 {
  font-size: clamp(32px, 5vw, 56px);
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.1;
  margin-bottom: 16px;
  background: linear-gradient(135deg, #e8e8f0 30%, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero p {
  font-size: 18px;
  color: var(--text-muted);
  max-width: 560px;
  margin: 0 auto 40px;
}

/* ---- FILTERS ---- */
.filters-wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 32px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.filter-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
  font-family: inherit;
}

.filter-btn:hover {
  border-color: var(--border-hover);
  color: var(--text);
}

.filter-btn.active {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}

/* ---- GRID ---- */
.grid-wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

.project-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

/* ---- PROJECT CARD ---- */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  transition: all 0.2s ease;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--radius);
  opacity: 0;
  transition: opacity 0.2s ease;
  pointer-events: none;
}

.card:hover {
  border-color: var(--border-hover);
  background: var(--bg-card-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

.card:hover::before { opacity: 1; }

.card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.card-name-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

.card-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.card-name {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.02em;
  font-family: 'JetBrains Mono', monospace;
}

.card-stars {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  font-weight: 600;
  color: var(--yellow);
  flex-shrink: 0;
  background: rgba(250,204,21,0.1);
  border: 1px solid rgba(250,204,21,0.2);
  padding: 3px 8px;
  border-radius: 100px;
}

.card-desc {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.6;
  flex: 1;
}

.card-desc strong {
  color: var(--text);
}

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.tag {
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 100px;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
}

.card-lang {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: var(--text-dim);
  flex-shrink: 0;
}

.lang-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.card-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 500;
  color: var(--accent);
  padding: 6px 12px;
  border: 1px solid var(--accent-glow);
  border-radius: var(--radius-sm);
  transition: all 0.15s ease;
  text-decoration: none;
  align-self: flex-start;
}

.card-link:hover {
  background: var(--accent-soft);
}

/* ---- CATEGORY ACCENT BORDERS ---- */
.cat-token   { border-top: 2px solid var(--orange); }
.cat-design  { border-top: 2px solid var(--pink); }
.cat-career  { border-top: 2px solid var(--green); }
.cat-rag     { border-top: 2px solid var(--cyan); }
.cat-video   { border-top: 2px solid var(--accent); }
.cat-cost    { border-top: 2px solid var(--yellow); }

.cat-token  .card-icon { background: rgba(251,146,60,0.12); }
.cat-design .card-icon { background: rgba(244,114,182,0.12); }
.cat-career .card-icon { background: rgba(74,222,128,0.12); }
.cat-rag    .card-icon { background: rgba(34,211,238,0.12); }
.cat-video  .card-icon { background: rgba(124,111,255,0.12); }
.cat-cost   .card-icon { background: rgba(250,204,21,0.12); }

/* ---- TOTALS BAR ---- */
.totals-bar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
}

.total-item {
  text-align: center;
}

.total-value {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.03em;
  font-family: 'JetBrains Mono', monospace;
}

.total-label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 2px;
}

/* ---- HIDDEN ---- */
.card.hidden { display: none; }

/* ---- FOOTER ---- */
footer {
  border-top: 1px solid var(--border);
  padding: 24px;
  text-align: center;
  font-size: 13px;
  color: var(--text-dim);
}

footer a { color: var(--text-muted); text-decoration: none; }
footer a:hover { color: var(--text); }

/* ---- RESPONSIVE ---- */
@media (max-width: 600px) {
  .project-grid { grid-template-columns: 1fr; }
  .header-stats { display: none; }
  .totals-bar { gap: 24px; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="#">
      <span class="logo-icon">⚡</span>
      Claude Code OSS
    </a>
    <div class="header-stats">
      <span class="stat-pill">
        <strong id="total-projects">7</strong> projects
      </span>
      <span class="stat-pill">
        <strong id="total-stars">—</strong> total stars
      </span>
    </div>
  </div>
</header>

<main>
  <section class="hero">
    <div class="hero-badge">⚡ Open Source</div>
    <h1>Claude Code<br>Ecosystem</h1>
    <p>A curated collection of open source tools built for and around Claude Code.</p>
  </section>

  <div class="totals-bar" id="totals-bar"></div>

  <div class="filters-wrap" id="filters"></div>

  <div class="grid-wrap">
    <div class="project-grid" id="grid"></div>
  </div>
</main>

<footer>
  Built by <a href="https://github.com/ulrich-e-r-djidonou" target="_blank" rel="noopener">Ulrich Djidonou</a>
  &nbsp;·&nbsp;
  MIT License
</footer>

<script>
const PROJECTS = [
  {
    name: "caveman",
    repo: "JuliusBrussee/caveman",
    url: "https://github.com/JuliusBrussee/caveman",
    stars: 62266,
    lang: "JavaScript",
    langColor: "#f7df1e",
    category: "token",
    icon: "🪨",
    tagline: "Why use many token when few token do trick.",
    desc: "<strong>65% fewer tokens</strong> by compressing Claude's output into caveman-style language. A Claude Code skill that dramatically cuts context costs.",
    tags: ["claude-code", "skill", "tokens", "llm"],
  },
  {
    name: "graphify",
    repo: "safishamsi/graphify",
    url: "https://github.com/safishamsi/graphify",
    stars: 49585,
    lang: "Python",
    langColor: "#3572A5",
    category: "rag",
    icon: "🕸️",
    tagline: "Any codebase → queryable knowledge graph.",
    desc: "Turn any folder of <strong>code, SQL schemas, scripts, docs, or videos</strong> into a knowledge graph. Works with Claude Code, Codex, Gemini CLI, Cursor.",
    tags: ["knowledge-graph", "graphrag", "rag", "skills"],
  },
  {
    name: "career-ops",
    repo: "santifer/career-ops",
    url: "https://github.com/santifer/career-ops",
    stars: 46092,
    lang: "JavaScript",
    langColor: "#f7df1e",
    category: "career",
    icon: "💼",
    tagline: "AI-powered job search, end to end.",
    desc: "<strong>14 skill modes</strong> — evaluate postings, generate ATS-optimized resumes, track applications, batch process. Built on Claude Code with a Go dashboard.",
    tags: ["claude-code", "job-search", "resume", "automation"],
  },
  {
    name: "impeccable",
    repo: "pbakaus/impeccable",
    url: "https://github.com/pbakaus/impeccable",
    stars: 28914,
    lang: "JavaScript",
    langColor: "#f7df1e",
    category: "design",
    icon: "✨",
    tagline: "The design language for AI harnesses.",
    desc: "A <strong>design language and token system</strong> that makes your AI coding agent dramatically better at producing polished, consistent UI.",
    tags: ["design-system", "tokens", "ai-design"],
  },
  {
    name: "codeburn",
    repo: "getagentseal/codeburn",
    url: "https://github.com/getagentseal/codeburn",
    stars: 6744,
    lang: "TypeScript",
    langColor: "#3178c6",
    category: "cost",
    icon: "🔥",
    tagline: "See where your AI coding tokens go.",
    desc: "Interactive <strong>TUI dashboard</strong> for cost observability across Claude Code, Codex, and Cursor. Track spend, spot waste, optimize usage.",
    tags: ["cost-tracking", "cli", "observability", "terminal-ui"],
  },
  {
    name: "design-extract",
    repo: "Manavarya09/design-extract",
    url: "https://github.com/Manavarya09/design-extract",
    stars: 2760,
    lang: "JavaScript",
    langColor: "#f7df1e",
    category: "design",
    icon: "🎨",
    tagline: "Extract any site's design system in one command.",
    desc: "Outputs <strong>DTCG design tokens</strong> — semantic, primitive, composite layers. MCP server for Claude Code/Cursor/Windsurf. Emits iOS SwiftUI, Android Compose, Tailwind v4, Figma variables.",
    tags: ["design-tokens", "mcp-server", "figma", "tailwind"],
  },
  {
    name: "claude-video",
    repo: "bradautomates/claude-video",
    url: "https://github.com/bradautomates/claude-video",
    stars: 1295,
    lang: "Python",
    langColor: "#3572A5",
    category: "video",
    icon: "🎬",
    tagline: "Give Claude the ability to watch any video.",
    desc: "The <code>/watch</code> command <strong>downloads a video, extracts frames, transcribes audio</strong>, and hands everything to Claude for analysis.",
    tags: ["video", "transcription", "multimodal", "skill"],
  },
];

const CATEGORIES = {
  all:    { label: "All", emoji: "⚡" },
  token:  { label: "Token Optimization", emoji: "🪨" },
  rag:    { label: "Knowledge / RAG", emoji: "🕸️" },
  career: { label: "Career", emoji: "💼" },
  design: { label: "Design", emoji: "🎨" },
  cost:   { label: "Cost Observability", emoji: "🔥" },
  video:  { label: "Video / Media", emoji: "🎬" },
};

function formatStars(n) {
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
  return String(n);
}

function renderTotals() {
  const totalStars = PROJECTS.reduce((s, p) => s + p.stars, 0);
  document.getElementById('total-stars').textContent = formatStars(totalStars);

  const bar = document.getElementById('totals-bar');
  const byLang = {};
  PROJECTS.forEach(p => { byLang[p.lang] = (byLang[p.lang] || 0) + 1; });

  const items = [
    { value: PROJECTS.length, label: 'Projects' },
    { value: formatStars(totalStars) + ' ⭐', label: 'GitHub Stars' },
    { value: Object.keys(byLang).join(' · '), label: 'Languages' },
  ];

  bar.innerHTML = items.map(i => `
    <div class="total-item">
      <div class="total-value" style="color: var(--accent)">${i.value}</div>
      <div class="total-label">${i.label}</div>
    </div>
  `).join('');
}

function renderFilters(active, onFilter) {
  const wrap = document.getElementById('filters');
  wrap.innerHTML = Object.entries(CATEGORIES).map(([key, { label, emoji }]) => {
    const count = key === 'all' ? PROJECTS.length : PROJECTS.filter(p => p.category === key).length;
    return `
      <button class="filter-btn ${key === active ? 'active' : ''}" data-cat="${key}">
        ${emoji} ${label} <span style="opacity:.5">${count}</span>
      </button>
    `;
  }).join('');

  wrap.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => onFilter(btn.dataset.cat));
  });
}

function renderCards(activeCategory) {
  const grid = document.getElementById('grid');
  grid.innerHTML = PROJECTS.map(p => {
    const hidden = activeCategory !== 'all' && p.category !== activeCategory ? ' hidden' : '';
    return `
      <a class="card cat-${p.category}${hidden}" href="${p.url}" target="_blank" rel="noopener" data-cat="${p.category}">
        <div class="card-header">
          <div class="card-name-wrap">
            <div class="card-icon">${p.icon}</div>
            <span class="card-name">${p.name}</span>
          </div>
          <span class="card-stars">⭐ ${formatStars(p.stars)}</span>
        </div>
        <p class="card-desc">${p.desc}</p>
        <div class="card-footer">
          <div class="card-tags">
            ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
          <div class="card-lang">
            <span class="lang-dot" style="background:${p.langColor}"></span>
            ${p.lang}
          </div>
        </div>
        <span class="card-link">View on GitHub →</span>
      </a>
    `;
  }).join('');
}

let activeCategory = 'all';

function applyFilter(cat) {
  activeCategory = cat;
  renderFilters(cat, applyFilter);
  document.querySelectorAll('.card').forEach(card => {
    if (cat === 'all' || card.dataset.cat === cat) {
      card.classList.remove('hidden');
    } else {
      card.classList.add('hidden');
    }
  });
}

renderTotals();
renderFilters('all', applyFilter);
renderCards('all');
</script>
</body>
</html>
